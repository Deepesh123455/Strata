# hadolint config for the Dockerfile lint in CI.
# Fail the build on real problems (warnings + errors), not stylistic info.
failure-threshold: warning
ignored:
  # DL3029: "Do not use --platform with FROM." We intentionally use
  # --platform=$BUILDPLATFORM to cross-compile on the native builder (fast),
  # then GOOS/GOARCH-target the binary. This is the recommended multi-arch
  # pattern, not the anti-pattern the rule warns about.
  - DL3029
  # DL3003: "Use WORKDIR to switch to a directory." We `cd DataPlane &&` inside
  # the build RUNs on purpose: the Go module lives in the DataPlane/ subdir while
  # the COPY paths (go.work, DataPlane/) are relative to /src. Switching WORKDIR
  # to /src/DataPlane would break the subsequent `COPY DataPlane/ DataPlane/`, and
  # we must stay in /src so go.work workspace resolution works. The `cd` is scoped
  # to each RUN and is the correct pattern here.
  - DL3003
