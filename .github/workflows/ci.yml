# CI — runs on every PR and on pushes to main. NO cloud, NO secrets: this is
# the fast, always-green gate that proves the code, the image, and the IaC are
# sound before anything is allowed to merge or ship. CD (cd.yml) does the cloud.
#
# Make these jobs "Required" in branch protection so main can't go red.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; individual jobs widen only what they need.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_DIR: DataPlane

jobs:
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Single source of truth for the Go version: the module's go.mod.
          go-version-file: ${{ env.MODULE_DIR }}/go.mod
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to the last golangci-lint v1: `latest` now resolves to v2,
          # which action v6 + the v1-format .golangci.yml can't run.
          version: v1.64.8
          working-directory: ${{ env.MODULE_DIR }}
          args: --timeout=5m

  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.MODULE_DIR }}/go.mod
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.mod
      - name: go vet
        working-directory: ${{ env.MODULE_DIR }}
        run: go vet ./...
      # -race is essential here: 32 shards, atomics, goroutine-per-connection.
      # -shuffle=on surfaces order-dependent test bugs.
      - name: go test -race
        working-directory: ${{ env.MODULE_DIR }}
        # -coverpkg=./... is REQUIRED: all tests live in `package tests`, so
        # without it coverage is attributed only to that package (→ 0.0%).
        run: go test -race -shuffle=on -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Enforce coverage threshold
        working-directory: ${{ env.MODULE_DIR }}
        # Floor only — ratchet it up over time via the COVERAGE_THRESHOLD repo
        # variable (Settings → Variables → Actions). Defaults low so it never
        # surprises on day one.
        run: |
          thr="${{ vars.COVERAGE_THRESHOLD || '30' }}"
          cov="$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')"
          echo "total coverage: ${cov}%  (floor: ${thr}%)"
          awk -v c="$cov" -v t="$thr" 'BEGIN { exit (c+0 < t+0) ? 1 : 0 }' \
            || { echo "::error::coverage ${cov}% is below the ${thr}% floor"; exit 1; }
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ env.MODULE_DIR }}/coverage.out
          if-no-files-found: ignore

  vuln:
    name: Vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.MODULE_DIR }}/go.mod
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.mod
      - name: govulncheck (deps + stdlib)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd "${{ env.MODULE_DIR }}" && govulncheck ./...

  modules:
    name: Module integrity (go.sum / tidy)
    runs-on: ubuntu-latest
    # Supply-chain "first line of defence": guarantees go.mod/go.sum are honest.
    # Today there are zero third-party deps, so go.sum is (correctly) absent.
    # The SECOND a dependency is added, this gate fails unless its checksums are
    # committed in go.sum — so the protection is automatic and can never be
    # forgotten.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.MODULE_DIR }}/go.mod
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.mod
      - name: Verify module checksums against go.sum
        working-directory: ${{ env.MODULE_DIR }}
        run: go mod verify
      - name: Ensure go.mod/go.sum are tidy AND committed
        working-directory: ${{ env.MODULE_DIR }}
        run: |
          go mod tidy
          # `git status --porcelain` catches BOTH a modified go.mod/go.sum and a
          # newly-created-but-untracked go.sum (which `git diff` alone would miss).
          changed="$(git status --porcelain -- go.mod go.sum)"
          if [ -n "$changed" ]; then
            echo "::error::go.mod/go.sum are not tidy or not committed."
            echo "Run 'go mod tidy' in DataPlane/ and commit go.mod + go.sum."
            echo "--- offending paths ---"; echo "$changed"
            git --no-pager diff -- go.mod go.sum || true
            exit 1
          fi
          echo "OK: modules tidy & in sync (go.sum currently empty — stdlib only)."

  image:
    name: Image build + scan + smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # to upload the Trivy SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Lint the Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: DataPlane/Dockerfile

      - uses: docker/setup-buildx-action@v3

      # Build the REAL production image (single arch for speed) and load it so
      # we can scan and smoke-test the exact artifact.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: DataPlane/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: powerhouse-cache:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.pushed_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: powerhouse-cache:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      # Best-effort: surfaces results in the Security tab on repos with code
      # scanning (free on public repos / GHAS on private). The gate above
      # (exit-code 1) is what actually fails the build, so this never blocks it.
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # End-to-end proof: bring the image up and run a real RESP round-trip via
      # the compose smoke profile (also exercises the healthcheck gate).
      - name: Smoke test (docker compose)
        run: docker compose --profile smoke up --abort-on-container-exit --exit-code-from smoke
      - name: Teardown
        if: always()
        run: docker compose --profile smoke down -v

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan full history, not just the tip
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac:
    name: Terraform scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Self-activating: no-ops until infra/terraform/ exists, then enforces.
      - name: Detect terraform
        id: detect
        run: |
          if [ -d infra/terraform ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::infra/terraform/ not present yet — skipping IaC scan."
          fi
      - uses: hashicorp/setup-terraform@v3
        if: steps.detect.outputs.present == 'true'
      - name: terraform fmt + validate
        if: steps.detect.outputs.present == 'true'
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate
      - name: tfsec
        if: steps.detect.outputs.present == 'true'
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
