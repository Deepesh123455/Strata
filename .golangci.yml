# golangci-lint config (v2 format — required by golangci-lint v2 / action v9).
# Curated for high signal: correctness + security linters that rarely
# false-positive, so the gate stays meaningful rather than noisy. Raise the bar
# over time as the codebase grows.
version: "2"

run:
  tests: true

linters:
  # Start from the default ("standard") set — errcheck, govet, ineffassign,
  # staticcheck, unused — and ADD the ones that earn their keep here. (staticcheck
  # in v2 also subsumes the old gosimple + stylecheck.)
  enable:
    - govet         # suspicious constructs (incl. copylocks — mutex copies)
    - staticcheck   # the big one: bugs, simplifications, deprecations
    - errcheck      # unchecked errors
    - ineffassign   # ineffective assignments
    - unused        # dead code
    - misspell      # typos in comments/strings
    - unconvert     # redundant type conversions
    - bodyclose     # unclosed HTTP/response bodies (future-proofing)
    - copyloopvar   # loop-variable capture bugs

    # gosec is intentionally OFF by default: its newer G115 (integer-overflow
    # conversion) rule false-positives heavily on this parser/WAL arithmetic,
    # which would make the gate noisy on day one. Source-level security is
    # already covered by CodeQL (security-extended) + govulncheck + Trivy.
    # Turn it on after one triage pass:
    #   - gosec

  exclusions:
    presets:
      # Restores golangci-lint v1's built-in EXC0001 default (made opt-in in v2):
      # don't flag unchecked errors on conventional cleanup/throwaway calls such
      # as `.*Close`, `Flush`, `os.Remove*`, and the print family. These are
      # deliberate fire-and-forget cleanups (deferred conn/file Close, etc.);
      # errors that genuinely matter are handled explicitly at the call site.
      - std-error-handling
    rules:
      # Tests legitimately do things linters dislike (ignored errors in setup,
      # hardcoded test fixtures). Don't fail the build on those.
      - path: _test\.go
        linters:
          - gosec
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
